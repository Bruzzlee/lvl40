<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unlocking Level 40! Join me for a celebration of friendship, fun, and a new chapter.">
    <meta name="theme-color" content="#fbbf24">
    
    <title>Unlocking Level 40</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Set language from localStorage or default to German
        const savedLang = localStorage.getItem('partyLang') || 'de';
        document.documentElement.lang = savedLang;
        document.documentElement.setAttribute('data-lang', savedLang);
    </script>
</head>
<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn" data-lang="en" title="English">EN</button>
        <span class="lang-separator">/</span>
        <button class="lang-btn" data-lang="de" title="Deutsch">DE</button>
    </div>

    <!-- Registration Banner -->
    <div class="registration-banner">
        <p><span>✨ </span><strong><a href="#form-section" data-i18n="register_banner_link"></a></strong> <span data-i18n="register_banner_help"></span></p>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="headline">Unlocking Level 40</h1>
            <p class="subheadline" data-i18n="hero_intro"></p>
        </div>
    </section>

    <!-- Info Section -->
    <section class="info">
        <div class="container">
            <h2 data-i18n="party_details"></h2>
            
            <div class="details-grid">
                <div class="detail-card">
                    <h3 data-i18n="date_label"></h3>
                    <p>Saturday, August 15, 2026</p>
                </div>
                
                <div class="detail-card">
                    <h3 data-i18n="time_label"></h3>
                    <p data-i18n="time_value"></p>
                </div>
                
                <div class="detail-card">
                    <h3 data-i18n="location_label"></h3>
                    <p>
                        Illnauerstrasse 50<br>
                        8307 Illnau-Effretikon<br>
                        <a href="https://maps.app.goo.gl/5CDeeTHcgaWRwJU28" target="_blank" data-i18n="location_link"></a>
                    </p>
                </div>
            </div>

            <div class="description">
                <h3 data-i18n="about_party"></h3>
                <p data-i18n="about_text"></p>
            </div>

            <div class="how-to-reach">
                <h3 data-i18n="how_to_reach"></h3>
                <div class="transport-options">
                    <div class="transport-card">
                        <h4 data-i18n="by_car"></h4>
                        <p data-i18n="parking_text"></p>
                    </div>
                    <div class="transport-card">
                        <h4 data-i18n="by_transport"></h4>
                        <p>
                            <strong data-i18n="from_station"></strong><br>
                            <em data-i18n="option1"></em><span data-i18n="walk_time"></span><br>
                            <em data-i18n="option2"></em><span data-i18n="bus_info"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Food & Drinks Section -->
    <section class="food-drinks">
        <div class="container">
            <h2 data-i18n="food_drinks"></h2>
            
            <div class="food-grid">
                <div class="food-card">
                    <h3 data-i18n="food_label"></h3>
                    <p data-i18n="food_text"></p>
                </div>
                
                <div class="food-card">
                    <h3 data-i18n="beverages_label"></h3>
                    <p data-i18n="beverages_text"></p>
                </div>
            </div>

            <div class="food-note">
                <p>
                    <strong data-i18n="contribute_ask"></strong><span data-i18n="contribute_text"></span>
                </p>
            </div>
        </div>
    </section>

    <!-- RSVP Section -->
    <section class="rsvp">
        <div class="container">
            <h2 data-i18n="rsvp_heading"></h2>
            <div class="registration-highlight">
                <p><strong data-i18n="love_to_have"></strong> <span data-i18n="rsvp_text"></span></p>
            </div>

            <!-- 
                RSVP FORM SETUP:
                This iframe is a placeholder for your Google Forms or Microsoft Forms embed.
                
                STEPS:
                1. Create a form with these fields:
                   - Name (short text, required)
                   - Will you attend? 
                     * Afternoon (12 PM - 5 PM)
                     * Evening (5 PM - 9 PM)
                     * Night (9 PM+)
                     * Multiple selections allowed (checkboxes, not radio)
                   - What will you bring? (e.g., salad, dessert, drinks) (paragraph text)
                   - Interested in grill food (meat)? (yes/no)
                   - Protein preference (optional):
                     * Sausage
                     * Steak
                     * No preference
                     * (Radio buttons, not required)
                
                2. Get the embed code from your form platform
                3. Replace the src attribute below with your form's embed URL
                
                FOR GOOGLE FORMS:
                - Open your form
                - Click "Send"
                - Click the embed icon (</> symbol)
                - Copy the iframe src URL
                - Replace "YOUR_FORM_EMBED_URL_HERE" with it
                
                FOR MICROSOFT FORMS:
                - Open your form
                - Click "Share"
                - Click "Embed"
                - Copy the iframe src URL
                - Replace "YOUR_FORM_EMBED_URL_HERE" with it
            -->
            <div class="form-wrapper" id="form-section">
                <a href="https://forms.microsoft.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAFJUFqpOIVUNEY3V0dUTzZGOUtRR1ZYT1hVUTVCWUdYNy4u" class="form-button" target="_blank" rel="noopener noreferrer" data-i18n="form_button_text"></a>
                <p class="form-open-note" data-i18n="form_open_note"></p>
            </div>

            <p class="form-note">
                <span data-i18n="questions"></span><a href="mailto:bgrl3ecda@mozmail.com" data-i18n="get_in_touch"></a> <span data-i18n="happy_to_help"></span>
            </p>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="footer">
        <div class="container">
            <p>
                <strong data-i18n="thanks_closing"></strong>
            </p>
            <p class="footer-meta">
                Made with ❤️ for Level 40
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
