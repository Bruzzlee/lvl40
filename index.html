<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unlocking Level 40! Join me for a celebration of friendship, fun, and a new chapter.">
    <meta name="theme-color" content="#e52521">
    
    <title data-i18n="page_title">Level-UP 40!</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/green_mushroom.svg">
    <link rel="stylesheet" href="style.css">
    <script>
        // Set language from localStorage or default to German
        const savedLang = localStorage.getItem('partyLang') || 'de';
        document.documentElement.lang = savedLang;
        document.documentElement.setAttribute('data-lang', savedLang);
    </script>
</head>
<body>
    <!-- Registration Banner (first element) -->
    <div class="registration-banner">
        <p><span>✨ </span><strong><a href="#form-section" data-i18n="register_banner_link"></a></strong></p>
    </div>

    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn" data-lang="en" title="English">EN</button>
        <span class="lang-separator">/</span>
        <button class="lang-btn" data-lang="de" title="Deutsch">DE</button>
    </div>

    <!-- Mario HUD Bar -->
    <div class="mario-hud">
        <div class="hud-item">
            <span class="hud-label">MARIO</span>
            <span class="hud-value">004000</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">&nbsp;</span>
            <span class="hud-value"><img src="assets/images/coin.svg" alt="coin" width="18" height="18" style="image-rendering:pixelated;vertical-align:text-top"> × 40</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">WORLD</span>
            <span class="hud-value">4 - 0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">TIME</span>
            <span class="hud-value" id="hud-timer">400</span>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Pixel clouds -->
        <div class="clouds-layer">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>

        <div class="hero-content">
            <div class="coin-block">?</div>
            <h1 class="headline" data-i18n="headline">Level-UP 40!</h1>
            <p class="subheadline" data-i18n="hero_intro"></p>
        </div>

        <!-- Decorative pipes + 1UP mushroom walker -->
        <div class="hero-pipes">
            <div class="pipe pipe-left">
                <div class="pipe-cap"></div>
                <div class="pipe-body"></div>
            </div>

            <!-- Animated 1UP mushroom -->
            <div class="oneup-mushroom" aria-label="1-UP mushroom" role="img">
                <img src="assets/images/green_mushroom.svg" alt="1UP mushroom" width="64" height="64" style="image-rendering:pixelated;display:block">
            </div>

            <div class="pipe pipe-right">
                <div class="pipe-cap"></div>
                <div class="pipe-body"></div>
            </div>
        </div>

        <!-- Ground -->
        <div class="hero-ground">
            <div class="hero-ground-top"></div>
            <div class="hero-ground-body"></div>
        </div>
    </section>

    <!-- Info Section -->
    <section class="info">
        <div class="container">
            <h2 data-i18n="party_details"></h2>
            
            <div class="details-grid">
                <div class="detail-card">
                    <h3 data-i18n="date_label"></h3>
                    <p>Saturday,</p>
                    <p>15. August, 2026</p>
                    <a href="assets/party.ics" download data-i18n="add_to_calendar"></a>
                </div>
                
                <div class="detail-card">
                    <h3 data-i18n="time_label"></h3>
                    <p data-i18n="time_value"></p>
                </div>
                
                <div class="detail-card">
                    <h3 data-i18n="location_label"></h3>
                    <p>
                        Illnauerstr. 50<br>
                        8307 Effretikon<br>
                        <a href="https://maps.app.goo.gl/5CDeeTHcgaWRwJU28" target="_blank" data-i18n="location_link"></a>
                    </p>
                </div>
            </div>

            <div class="description">
                <h3 data-i18n="about_party"></h3>
                <p data-i18n="about_text"></p>
            </div>

            <div class="how-to-reach">
                <h3 data-i18n="how_to_reach"></h3>
                <div class="transport-options">
                    <div class="transport-card">
                        <h4 data-i18n="by_car"></h4>
                        <p data-i18n="parking_text"></p>
                        <a href="https://maps.app.goo.gl/5CDeeTHcgaWRwJU28" target="_blank" rel="noopener noreferrer" data-i18n="location_link"></a>
                    </div>
                    <div class="transport-card">
                        <h4 data-i18n="by_transport"></h4>
                        <p>
                            <span data-i18n="from_station"></span><br>
                            <span data-i18n="option1"></span><br>
                            <span data-i18n="option2"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Food & Drinks Section -->
    <section class="food-drinks">
        <div class="container">
            <h2 data-i18n="food_drinks"></h2>
            
            <div class="food-grid">
                <div class="food-card">
                    <h3 data-i18n="food_label"></h3>
                    <p data-i18n="food_text"></p>
                </div>
                
                <div class="food-card">
                    <h3 data-i18n="beverages_label"></h3>
                    <p data-i18n="beverages_text"></p>
                </div>
            </div>

            <div class="food-note">
                <h3 data-i18n="contribute_ask"></h3>
                <p data-i18n="contribute_text"></p>
            </div>
        </div>
    </section>

    <!-- RSVP Section -->
    <section class="rsvp">
        <div class="container">
            <h2 data-i18n="rsvp_heading"></h2>
            <div class="registration-highlight">
                <p><strong data-i18n="love_to_have"></strong> <span data-i18n="rsvp_text"></span></p>
            </div>
            <div class="form-wrapper" id="form-section">
                <a href="https://forms.microsoft.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAFJUFqpOIVUNEY3V0dUTzZGOUtRR1ZYT1hVUTVCWUdYNy4u" class="form-button" target="_blank" rel="noopener noreferrer" data-i18n="form_button_text"></a>
                <p class="form-open-note" data-i18n="form_open_note"></p>
            </div>

            <p class="form-note">
                <span data-i18n="questions"></span><a href="mailto:bgrl3ecda@mozmail.com" data-i18n="get_in_touch"></a> <span data-i18n="happy_to_help"></span>
            </p>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="footer">
        <div class="container">
            <p>
                <strong data-i18n="thanks_closing"></strong>
            </p>
            <p class="footer-meta">
                Made with ❤️ by Chegelini
            </p>
        </div>
    </footer>

    <script src="script.js?v=3"></script>
</body>
</html>
