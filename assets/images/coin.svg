<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" shape-rendering="crispEdges">
  <!-- Black outline -->
  <rect x="3" y="0" width="8" height="1" fill="#000"/>
  <rect x="1" y="1" width="2" height="1" fill="#000"/>
  <rect x="11" y="1" width="2" height="1" fill="#000"/>
  <rect x="0" y="2" width="1" height="10" fill="#000"/>
  <rect x="13" y="2" width="1" height="10" fill="#000"/>
  <rect x="1" y="12" width="2" height="1" fill="#000"/>
  <rect x="11" y="12" width="2" height="1" fill="#000"/>
  <rect x="3" y="13" width="8" height="1" fill="#000"/>
  <!-- Gold body -->
  <rect x="3" y="1" width="8" height="1" fill="#ffd700"/>
  <rect x="1" y="2" width="12" height="10" fill="#ffd700"/>
  <rect x="3" y="12" width="8" height="1" fill="#ffd700"/>
  <!-- Bright highlight (upper-left) -->
  <rect x="1" y="2" width="3" height="1" fill="#fff0a0"/>
  <rect x="1" y="3" width="2" height="5" fill="#fff0a0"/>
  <!-- Dark shadow (right side) -->
  <rect x="11" y="2" width="2" height="10" fill="#c8a000"/>
</svg>
